<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>НБСС — Национальная Быстрая Социальная Сеть</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
  <div class="app-container">
    <aside class="sidebar sidebar-left">
      <div class="sidebar-logo">
        <img src="logo.png" alt="НБСС">
        <span class="logo-text">НБСС</span>
      </div>
      <nav class="nav">
        <a class="nav-item active" data-page="home"><span>🏠</span> <span>Главная</span></a>
        <a class="nav-item" data-page="profile" id="navProfile" style="display:none"><span>👤</span> <span>Профиль</span></a>
        <a class="nav-item" data-page="events"><span>📅</span> <span>Ивенты</span></a>
        <a class="nav-item" data-page="admin" id="navAdmin" style="display:none"><span>⚙️</span> <span>Админка</span></a>
        <a class="nav-item" id="logoutLink" style="display:none"><span>🚪</span> <span>Выйти</span></a>
        <a class="nav-item" id="loginLink" data-page="login"><span>🔑</span> <span>Войти</span></a>
        <a class="nav-item" id="registerLink" data-page="register"><span>📝</span> <span>Регистрация</span></a>
      </nav>
      <button id="themeToggle" class="theme-toggle-btn">🌓</button>
    </aside>

    <main class="main-content">
      <div class="search-box" style="margin: 10px 20px;">
        <input type="text" id="searchInput" placeholder="🔍 Поиск людей..." style="width:100%;">
        <div id="searchResults" class="search-results"></div>
      </div>

      <section id="loginPage" class="page">...</section>
      <section id="registerPage" class="page">...</section>
      <section id="homePage" class="page active">...</section>

      <!-- Профиль с баннером и аватаркой -->
      <section id="profilePage" class="page">
        <div class="profile-banner" id="profileBanner">
          <img id="bannerImg" src="" alt="Баннер" style="display:none;">
          <div class="banner-upload-hint" id="bannerHint">Нажмите, чтобы загрузить баннер</div>
        </div>
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">
            <img id="avatarImg" src="" alt="Аватар" style="display:none;">
            <div class="avatar-placeholder" id="avatarPlaceholder">?</div>
          </div>
          <div class="profile-info">
            <h2 id="profileName">Профиль</h2>
            <p id="profileStatus"></p>
          </div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <input type="file" id="bannerInput" accept="image/*" style="display:none;">
        <div id="profilePosts" class="feed"></div>
      </section>

      <section id="eventsPage" class="page">...</section>
      <section id="adminPage" class="page">...</section>
    </main>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
