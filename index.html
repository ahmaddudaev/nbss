<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>НБСС — Национальная Быстрая Социальная Сеть</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="classic">
  <div class="notification-bell" id="notificationBell">🔔<span class="badge" id="notificationBadge" style="display:none;">0</span></div>
  <div class="notification-history" id="notificationHistory">
    <div class="notification-history-header">Уведомления</div>
    <div class="notification-history-list" id="notificationList"></div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="app-container">
    <aside class="sidebar sidebar-left">
      <div class="sidebar-logo"><img src="logo.png" alt="НБСС"><span class="logo-text">НБСС</span></div>
      <nav class="nav">
        <a class="nav-item active" data-page="home"><span>🏠</span> <span>Главная</span></a>
        <a class="nav-item" data-page="profile" id="navProfile" style="display:none"><span>👤</span> <span>Профиль</span></a>
        <a class="nav-item" data-page="messages" id="navMessages" style="display:none"><span>💬</span> <span>Сообщения</span></a>
        <a class="nav-item" data-page="events"><span>📅</span> <span>Ивенты</span></a>
        <a class="nav-item" data-page="admin" id="navAdmin" style="display:none"><span>⚙️</span> <span>Админка</span></a>
        <a class="nav-item" data-page="settings"><span>🎨</span> <span>Тема</span></a>
        <a class="nav-item" id="logoutLink" data-page="logout" style="display:none"><span>🚪</span> <span>Выйти</span></a>
        <a class="nav-item" id="loginLink" data-page="login"><span>🔑</span> <span>Войти</span></a>
        <a class="nav-item" id="registerLink" data-page="register"><span>📝</span> <span>Регистрация</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="search-box" style="margin:10px 20px;"><input type="text" id="searchInput" placeholder="🔍 Поиск людей..." style="width:100%;"><div id="searchResults" class="search-results"></div></div>

      <section id="settingsPage" class="page">...</section>
      <section id="loginPage" class="page">...</section>
      <section id="registerPage" class="page">...</section>
      <section id="homePage" class="page active">...</section>
      <section id="profilePage" class="page">...</section>
      <section id="messagesPage" class="page">...</section>
      <section id="eventsPage" class="page">...</section>
      <section id="adminPage" class="page">
        <div class="admin-container">
          <h2>⚙️ Административная панель</h2>
          <div class="card" id="adminStats"></div>
          <div class="card">
            <h3>👥 Пользователи</h3>
            <div class="admin-select-wrapper">
              <select id="userSelect"></select>
              <span class="admin-select-icon">▼</span>
            </div>
            <div class="admin-actions">
              <button id="verifyUserBtn" class="btn outline">✅ Галочка</button>
              <button id="unverifyUserBtn" class="btn outline">❌ Убрать</button>
              <button id="givePremiumBtn" class="btn outline">💎 НБСС+</button>
              <button id="revokePremiumBtn" class="btn outline">💔 Отобрать</button>
              <button id="setOwnerBtn" class="btn outline">👑 Владелец</button>
              <button id="setHeadAdminBtn" class="btn outline">🛡 Гл.админ</button>
              <button id="setAdminBtn" class="btn outline">🔴 Админ</button>
              <button id="setModeratorBtn" class="btn outline">🔵 Модер</button>
              <button id="setEventModeratorBtn" class="btn outline">📅 Ивент-модер</button>
              <button id="banUserBtn" class="btn outline">⛔ Бан (1ч)</button>
              <button id="unbanUserBtn" class="btn outline">✅ Разбан</button>
              <button id="deleteUserBtn" class="btn danger">🗑 Удалить</button>
            </div>
          </div>
          <div class="card">
            <h3>Создать ивент</h3>
            <input id="eventTitle" placeholder="Название">
            <textarea id="eventDesc" placeholder="Описание"></textarea>
            <button id="createEventBtn" class="btn primary">🚀 Запустить</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="mobile-nav">
      <a class="mobile-nav-item active" data-page="home"><span>🏠</span></a>
      <a class="mobile-nav-item" data-page="profile" id="mobileNavProfile" style="display:none"><span>👤</span></a>
      <a class="mobile-nav-item" data-page="messages" id="mobileNavMessages" style="display:none"><span>💬</span></a>
      <a class="mobile-nav-item" data-page="events"><span>📅</span></a>
      <a class="mobile-nav-item" data-page="admin" id="mobileNavAdmin" style="display:none"><span>⚙️</span></a>
      <a class="mobile-nav-item" data-page="settings"><span>🎨</span></a>
      <a class="mobile-nav-item" id="mobileLogoutLink" data-page="logout" style="display:none"><span>🚪</span></a>
      <a class="mobile-nav-item" id="mobileLoginLink" data-page="login"><span>🔑</span></a>
      <a class="mobile-nav-item" id="mobileRegisterLink" data-page="register"><span>📝</span></a>
    </nav>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
