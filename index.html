<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>НБСС — Национальная Быстрая Социальная Сеть</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Левая панель (ПК) -->
    <aside class="sidebar sidebar-left">
      <div class="sidebar-logo">
        <img src="logo.png" alt="НБСС">
        <span class="logo-text">НБСС</span>
      </div>
      <nav class="nav">
        <a class="nav-item active" data-page="home"><span>🏠</span> <span>Главная</span></a>
        <a class="nav-item" data-page="profile" id="navProfile" style="display:none"><span>👤</span> <span>Профиль</span></a>
        <a class="nav-item" data-page="messages" id="navMessages" style="display:none"><span>💬</span> <span>Сообщения</span></a>
        <a class="nav-item" data-page="events"><span>📅</span> <span>Ивенты</span></a>
        <a class="nav-item" data-page="admin" id="navAdmin" style="display:none"><span>⚙️</span> <span>Админка</span></a>
        <a class="nav-item" data-page="settings"><span>🎨</span> <span>Тема</span></a>
        <a class="nav-item" id="logoutLink" style="display:none"><span>🚪</span> <span>Выйти</span></a>
        <a class="nav-item" id="loginLink" data-page="login"><span>🔑</span> <span>Войти</span></a>
        <a class="nav-item" id="registerLink" data-page="register"><span>📝</span> <span>Регистрация</span></a>
      </nav>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
      <div class="search-box" style="margin:10px 20px;">
        <input type="text" id="searchInput" placeholder="🔍 Поиск людей..." style="width:100%;">
        <div id="searchResults" class="search-results"></div>
      </div>

      <!-- Страницы -->
      <section id="settingsPage" class="page">
        <div class="card">
          <h2>🎨 Настройки темы</h2>
          <div class="theme-options">
            <label><input type="radio" name="theme" value="classic"> Классическая</label>
            <label><input type="radio" name="theme" value="liquid-light"> Liquid Glass Светлая</label>
            <label><input type="radio" name="theme" value="liquid-dark"> Liquid Glass Тёмная</label>
          </div>
        </div>
      </section>

      <section id="loginPage" class="page">...</section> <!-- без изменений -->
      <section id="registerPage" class="page">...</section>
      <section id="homePage" class="page active">...</section>

      <!-- Профиль (теперь может быть чужим) -->
      <section id="profilePage" class="page">
        <div class="profile-header" id="profileHeader"></div>
        <div id="profilePosts" class="feed"></div>
      </section>

      <!-- Сообщения -->
      <section id="messagesPage" class="page">
        <div class="messages-container">
          <div class="dialog-list" id="dialogList"></div>
          <div class="chat-view" id="chatView" style="display:none;">
            <div class="chat-header">
              <button class="back-to-dialogs btn outline">← Назад</button>
              <span id="chatPartner"></span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
              <input type="text" id="messageInput" placeholder="Сообщение...">
              <button id="sendMessageBtn" class="btn primary">Отправить</button>
            </div>
          </div>
        </div>
      </section>

      <section id="eventsPage" class="page">...</section>
      <section id="adminPage" class="page">...</section>
    </main>

    <!-- Мобильная нижняя панель -->
    <nav class="mobile-nav">
      <a class="mobile-nav-item active" data-page="home"><span>🏠</span></a>
      <a class="mobile-nav-item" data-page="profile" id="mobileNavProfile" style="display:none"><span>👤</span></a>
      <a class="mobile-nav-item" data-page="messages" id="mobileNavMessages" style="display:none"><span>💬</span></a>
      <a class="mobile-nav-item" data-page="events"><span>📅</span></a>
      <a class="mobile-nav-item" data-page="admin" id="mobileNavAdmin" style="display:none"><span>⚙️</span></a>
      <a class="mobile-nav-item" data-page="settings"><span>🎨</span></a>
      <a class="mobile-nav-item" id="mobileLogoutLink" style="display:none"><span>🚪</span></a>
      <a class="mobile-nav-item" id="mobileLoginLink" data-page="login"><span>🔑</span></a>
      <a class="mobile-nav-item" id="mobileRegisterLink" data-page="register"><span>📝</span></a>
    </nav>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
