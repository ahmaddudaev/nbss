<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>НБСС — Национальная Быстрая Социальная Сеть</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="classic">
  <div class="app-container">
    <aside class="sidebar sidebar-left">
      <div class="sidebar-logo">
        <img src="logo.png" alt="НБСС">
        <span class="logo-text">НБСС</span>
      </div>
      <nav class="nav">
        <a class="nav-item active" data-page="home"><span>🏠</span> <span>Главная</span></a>
        <a class="nav-item" data-page="profile" id="navProfile" style="display:none"><span>👤</span> <span>Профиль</span></a>
        <a class="nav-item" data-page="messages" id="navMessages" style="display:none"><span>💬</span> <span>Сообщения</span></a>
        <a class="nav-item" data-page="events"><span>📅</span> <span>Ивенты</span></a>
        <a class="nav-item" data-page="admin" id="navAdmin" style="display:none"><span>⚙️</span> <span>Админка</span></a>
        <a class="nav-item" data-page="settings"><span>🎨</span> <span>Тема</span></a>
        <a class="nav-item" id="logoutLink" data-page="logout" style="display:none"><span>🚪</span> <span>Выйти</span></a>
        <a class="nav-item" id="loginLink" data-page="login"><span>🔑</span> <span>Войти</span></a>
        <a class="nav-item" id="registerLink" data-page="register"><span>📝</span> <span>Регистрация</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="search-box" style="margin:10px 20px;">
        <input type="text" id="searchInput" placeholder="🔍 Поиск людей..." style="width:100%;">
        <div id="searchResults" class="search-results"></div>
      </div>

      <!-- Настройки -->
      <section id="settingsPage" class="page">
        <div class="card settings-card">
          <h2>🎨 Настройки темы</h2>
          <p class="settings-subtitle">Выберите внешний вид вашей социальной сети</p>
          <div class="theme-options">
            <label class="theme-option-label">
              <input type="radio" name="theme" value="classic">
              <span class="theme-preview classic-preview"></span>
              <span class="theme-name">Классическая</span>
            </label>
            <label class="theme-option-label">
              <input type="radio" name="theme" value="liquid-light">
              <span class="theme-preview liquid-light-preview"></span>
              <span class="theme-name">Liquid Glass Светлая</span>
            </label>
            <label class="theme-option-label">
              <input type="radio" name="theme" value="liquid-dark">
              <span class="theme-preview liquid-dark-preview"></span>
              <span class="theme-name">Liquid Glass Тёмная</span>
            </label>
          </div>
        </div>
      </section>

      <!-- Вход -->
      <section id="loginPage" class="page">
        <div class="auth-center">
          <div class="card auth-card">
            <h2>🔐 Вход в НБСС</h2>
            <input id="loginUsername" placeholder="Логин" autocomplete="username">
            <input id="loginPassword" type="password" placeholder="Пароль" autocomplete="current-password">
            <button id="loginBtn" class="btn primary full-width">Войти</button>
            <p>Нет аккаунта? <a id="showRegisterLink">Зарегистрироваться</a></p>
          </div>
        </div>
      </section>

      <!-- Регистрация -->
      <section id="registerPage" class="page">
        <div class="auth-center">
          <div class="card auth-card">
            <h2>📝 Регистрация</h2>
            <input id="regUsername" placeholder="Придумайте логин">
            <input id="regPassword" type="password" placeholder="Пароль">
            <button id="registerBtn" class="btn primary full-width">Создать аккаунт</button>
          </div>
        </div>
      </section>

      <!-- Главная -->
      <section id="homePage" class="page active">
        <div id="authBanner" class="auth-banner card" style="display:flex; justify-content:space-between; align-items:center;">
          <span>👋 Добро пожаловать в НБСС! Вы смотрите публичную ленту.</span>
          <span>
            <button id="loginFromBanner" class="btn outline" data-page="login">Войти</button>
            <button id="registerFromBanner" class="btn outline" data-page="register">Регистрация</button>
          </span>
        </div>
        <div id="postComposer" class="post-composer" style="display:none">
          <div class="composer-row">
            <input type="text" id="postInput" placeholder="Что происходит? #хештег @упоминание" class="composer-input" autocomplete="off">
            <button id="publishPost" class="btn primary composer-btn">Опубликовать</button>
          </div>
        </div>
        <div id="feedContainer" class="feed"></div>
      </section>

      <!-- Профиль, сообщения, ивенты, админка – идентичны предыдущим полным версиям -->
    </main>

    <nav class="mobile-nav">
      <a class="mobile-nav-item active" data-page="home"><span>🏠</span></a>
      <a class="mobile-nav-item" data-page="profile" id="mobileNavProfile" style="display:none"><span>👤</span></a>
      <a class="mobile-nav-item" data-page="messages" id="mobileNavMessages" style="display:none"><span>💬</span></a>
      <a class="mobile-nav-item" data-page="events"><span>📅</span></a>
      <a class="mobile-nav-item" data-page="admin" id="mobileNavAdmin" style="display:none"><span>⚙️</span></a>
      <a class="mobile-nav-item" data-page="settings"><span>🎨</span></a>
      <a class="mobile-nav-item" id="mobileLogoutLink" data-page="logout" style="display:none"><span>🚪</span></a>
      <a class="mobile-nav-item" id="mobileLoginLink" data-page="login"><span>🔑</span></a>
      <a class="mobile-nav-item" id="mobileRegisterLink" data-page="register"><span>📝</span></a>
    </nav>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
