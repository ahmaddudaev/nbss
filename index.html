<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d9bf0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="НБСС">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
  <title>НБСС</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="classic">
  <div id="banOverlay" class="ban-overlay" style="display:none;"><div class="ban-message"><h1 data-i18n="ban_title">🚫 Вы забанены</h1><p id="banUntilText"></p></div></div>
  <div class="notification-bell" id="notificationBell">🔔<span class="badge" id="notificationBadge" style="display:none;">0</span></div>
  <div class="app-container">
    <aside class="sidebar sidebar-left">
      <div class="sidebar-logo"><img src="logo.png" alt="НБСС"><span class="logo-text">НБСС</span></div>
      <nav class="nav">
        <a class="nav-item active" data-page="home"><span>🏠</span> <span data-i18n="home">Главная</span></a>
        <a class="nav-item" data-page="profile" id="navProfile" style="display:none"><span>👤</span> <span data-i18n="profile">Профиль</span></a>
        <a class="nav-item" data-page="events"><span>📅</span> <span data-i18n="events">Ивенты</span></a>
        <a class="nav-item" data-page="admin" id="navAdmin" style="display:none"><span>⚙️</span> <span data-i18n="admin">Админка</span></a>
        <a class="nav-item" data-page="settings"><span>🎨</span> <span data-i18n="theme">Тема</span></a>
        <a class="nav-item" id="logoutLink" data-page="logout" style="display:none"><span>🚪</span> <span data-i18n="logout">Выйти</span></a>
        <a class="nav-item" id="loginLink" data-page="login"><span>🔑</span> <span data-i18n="login">Войти</span></a>
        <a class="nav-item" id="registerLink" data-page="register"><span>📝</span> <span data-i18n="register">Регистрация</span></a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="search-box"><input type="text" id="searchInput" data-i18n-placeholder="search" placeholder="🔍 Поиск..." class="search-input-field"><button id="searchButton" class="btn primary">🔍</button><div id="searchResults" class="search-results"></div></div>

      <section id="homePage" class="page active">
        <div id="authBanner" class="auth-banner card" style="display:flex;justify-content:space-between;align-items:center;"><span data-i18n="welcome">👋 Добро пожаловать!</span><span><button id="loginFromBanner" class="btn outline" data-page="login" data-i18n="login">Войти</button> <button id="registerFromBanner" class="btn outline" data-page="register" data-i18n="register">Регистрация</button></span></div>
        <div id="postComposer" class="post-composer" style="display:none">
          <input type="text" id="postInput" data-i18n-placeholder="post_placeholder" placeholder="Что происходит?" class="composer-input">
          <label class="composer-file-label">🖼️<input type="file" id="postImageInput" accept="image/*" multiple style="display:none;"></label>
          <button id="publishPost" class="btn primary composer-btn" data-i18n="publish">Опубликовать</button>
          <div class="image-preview-container" id="imagePreviewContainer"></div>
        </div>
        <div id="feedContainer" class="feed"></div>
      </section>

      <section id="loginPage" class="page"><div class="auth-center"><div class="card auth-card"><h2 data-i18n="login_title">🔐 Вход</h2><input id="loginUsername" data-i18n-placeholder="username" placeholder="Логин"><input id="loginPassword" type="password" data-i18n-placeholder="password" placeholder="Пароль"><div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY"></div><button id="loginBtn" class="btn primary full-width" data-i18n="login_btn">Войти</button><p><span data-i18n="no_account">Нет аккаунта?</span> <a id="showRegisterLink" data-i18n="register_link">Зарегистрироваться</a></p></div></div></section>

      <section id="registerPage" class="page"><div class="auth-center"><div class="card auth-card"><h2 data-i18n="register_title">📝 Регистрация</h2><input id="regUsername" data-i18n-placeholder="username" placeholder="Логин"><input id="regPassword" type="password" data-i18n-placeholder="password" placeholder="Пароль"><div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY"></div><button id="registerBtn" class="btn primary full-width" data-i18n="register_btn">Создать</button></div></div></section>

      <section id="adminPage" class="page"><div class="admin-container"><h2 data-i18n="admin">⚙️ Админка</h2><div class="card" id="adminStats"></div><div class="card"><h3>👥 Пользователи</h3><input type="text" id="adminUserSearch" placeholder="Ник..." class="admin-search-input"><button id="adminSearchButton" class="btn primary">🔍</button><div id="adminSearchResults" class="admin-search-results"></div><div id="adminSelectedUser" style="display:none;"><h4>Выбран: <span id="adminSelectedUsername"></span></h4><div class="admin-actions"><button id="banUserBtn" class="btn outline" data-i18n="ban">⛔ Бан 1ч</button><button id="unbanUserBtn" class="btn outline" data-i18n="unban">✅ Разбан</button><button id="banIPBtn" class="btn outline" data-i18n="ban_ip">🌐 Бан IP</button><button id="unbanIPBtn" class="btn outline" data-i18n="unban_ip">🌐 Разбан IP</button><button id="deleteUserBtn" class="btn danger" data-i18n="delete">🗑 Удалить</button><button id="showPasswordBtn" class="btn outline" data-i18n="password_btn">🔑 Пароль</button></div></div></div></div></section>

      <!-- events, settings page добавить по желанию -->
    </main>
    <nav class="mobile-nav">
      <a class="mobile-nav-item active" data-page="home"><span>🏠</span></a>
      <a class="mobile-nav-item" data-page="profile" id="mobileNavProfile" style="display:none"><span>👤</span></a>
      <a class="mobile-nav-item" data-page="events"><span>📅</span></a>
      <a class="mobile-nav-item" data-page="admin" id="mobileNavAdmin" style="display:none"><span>⚙️</span></a>
      <a class="mobile-nav-item" data-page="settings"><span>🎨</span></a>
      <a class="mobile-nav-item" id="mobileLogoutLink" data-page="logout" style="display:none"><span>🚪</span></a>
      <a class="mobile-nav-item" id="mobileLoginLink" data-page="login"><span>🔑</span></a>
      <a class="mobile-nav-item" id="mobileRegisterLink" data-page="register"><span>📝</span></a>
    </nav>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
